<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f542;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8faa2a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>

  <!-- Flow arrow: left node → middle → right node -->
  <!-- Left circle (State) -->
  <circle cx="22" cy="50" r="9" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>

  <!-- Right circle (View) -->
  <circle cx="78" cy="50" r="9" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>

  <!-- Center diamond (Reducer) -->
  <polygon points="50,36 62,50 50,64 38,50" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Arrow: left → diamond -->
  <line x1="31" y1="50" x2="36" y2="50" stroke="#c8f542" stroke-width="2" stroke-linecap="round"/>
  <polygon points="36,47 41,50 36,53" fill="#c8f542"/>

  <!-- Arrow: diamond → right -->
  <line x1="63" y1="50" x2="67" y2="50" stroke="#c8f542" stroke-width="2" stroke-linecap="round"/>
  <polygon points="67,47 72,50 67,53" fill="#c8f542"/>

  <!-- Return arc on top (unidirectional loop) -->
  <path d="M 78 41 Q 50 18 22 41" fill="none" stroke="#c8f542" stroke-width="1.8" stroke-dasharray="3,3" stroke-linecap="round"/>
  <!-- arrowhead at end of arc -->
  <polygon points="22,41 17,37 19,44" fill="#c8f542"/>
</svg>
